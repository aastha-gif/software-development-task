<!DOCTYPE html>
<html>
<head>
    <title>Advanced Blog App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>My Blog App</h1>
        <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search posts..." onkeyup="searchPosts()">

    <!-- Create Post -->
    <div class="form-container">
        <input type="text" id="title" placeholder="Enter Post Title">
        <textarea id="content" placeholder="Enter Post Content"></textarea>
        <button onclick="addPost()">Add / Update Post</button>
    </div>

    <hr>

    <div id="posts"></div>

    <script src="script.js"></script>
</body>
</html>
